name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── C++ Build + Test (informational — does not block Pages) ──────────────────
  build-cpp:
    name: Build C++ Engine
    runs-on: ubuntu-22.04
    continue-on-error: true   # C++ build is optional in CI (needs ONNX RT)

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential python3-dev python3-pip

      - name: Install ONNX Runtime C++ SDK
        run: |
          ORT_VERSION="1.18.0"
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" -o /tmp/ort.tgz
          sudo tar xzf /tmp/ort.tgz -C /usr/local
          sudo mv /usr/local/onnxruntime-linux-x64-${ORT_VERSION} /usr/local/onnxruntime
          echo "ONNXRUNTIME_ROOT=/usr/local/onnxruntime" >> $GITHUB_ENV

      - name: Install pybind11
        run: pip3 install pybind11

      - name: Configure cmake
        working-directory: rag_engine
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR=$(python3 -c "import pybind11; print(pybind11.get_cmake_dir())") \
            -DONNXRUNTIME_ROOT=/usr/local/onnxruntime \
            -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build engine + tests
        working-directory: rag_engine/build
        run: make -j$(nproc) test_chunker test_mmr

      - name: Run C++ unit tests
        working-directory: rag_engine/build
        run: |
          ./test_chunker
          ./test_mmr

  # ── Python tests (pure-Python fallback, no .so needed) ──────────────────────
  test-python:
    name: Python Backend Tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Python tests
        working-directory: backend
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

  # ── Deploy frontend to GitHub Pages ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    needs: [test-python]   # only needs Python tests to pass
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
