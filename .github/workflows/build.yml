name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── C++ Build + Tests ─────────────────────────────────────────────────────────
  build-cpp:
    name: Build C++ Engine
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential python3-dev python3-pip

      - name: Install pybind11
        run: pip3 install pybind11

      - name: Configure cmake
        working-directory: rag_engine
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR=$(python3 -c "import pybind11; print(pybind11.get_cmake_dir())")

      - name: Build engine + tests
        working-directory: rag_engine/build
        run: make -j$(nproc)

      - name: Run C++ unit tests
        working-directory: rag_engine/build
        run: |
          ./test_chunker
          ./test_mmr
          ./test_index

      - name: Upload compiled .so
        uses: actions/upload-artifact@v4
        with:
          name: ragforge-core-so
          path: backend/ragforge_core*.so

  # ── Python tests ──────────────────────────────────────────────────────────────
  test-python:
    name: Python Backend Tests
    runs-on: ubuntu-22.04
    needs: [build-cpp]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download compiled .so
        uses: actions/download-artifact@v4
        with:
          name: ragforge-core-so
          path: backend/

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest httpx

      - name: Run Python tests (C++ backend)
        working-directory: backend
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

  # ── Deploy frontend to GitHub Pages ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    needs: [test-python]
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
