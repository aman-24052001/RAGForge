name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build C++ → commit .so to repo ───────────────────────────────────────────
  build-cpp:
    name: Build C++ Engine
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential python3-dev python3-pip

      - name: Install pybind11
        run: pip3 install pybind11

      - name: Configure cmake
        working-directory: rag_engine
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR=$(python3 -c "import pybind11; print(pybind11.get_cmake_dir())")

      - name: Build engine + tests
        working-directory: rag_engine/build
        run: make -j$(nproc)

      - name: Run C++ unit tests
        working-directory: rag_engine/build
        run: |
          ./test_chunker
          ./test_mmr
          ./test_index

      - name: Commit .so to repo (so Docker can copy it)
        run: |
          # Find the built .so
          SO=$(ls backend/ragforge_core*.so 2>/dev/null | head -1)
          if [ -z "$SO" ]; then
            echo "ERROR: No .so found after build"
            ls -la backend/
            exit 1
          fi
          echo "Built: $SO ($(du -sh $SO | cut -f1))"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "$SO"
          # Only commit if the .so actually changed
          if git diff --cached --quiet; then
            echo "No change in .so — skipping commit"
          else
            git commit -m "ci: update pre-built ragforge_core.so [skip ci]"
            git push
          fi

  # ── Python tests ──────────────────────────────────────────────────────────────
  test-python:
    name: Python Backend Tests
    runs-on: ubuntu-22.04
    needs: [build-cpp]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # get latest including the committed .so

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest httpx

      - name: Run Python tests
        working-directory: backend
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

  # ── Deploy frontend to GitHub Pages ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    needs: [test-python]
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
