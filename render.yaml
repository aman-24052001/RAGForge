services:
  - type: web
    name: ragforge-362o
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: INDEX_PATH
        value: /tmp/ragforge_index
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "64"
      - key: MMR_LAMBDA
        value: "0.6"
