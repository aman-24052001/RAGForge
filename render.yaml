services:
  - type: web
    name: ragforge-api
    env: python
    region: singapore   # closest free-tier to India
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      # Note: C++ .so is pre-built and committed, or fallback to pure-Python mode
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EMBEDDING_MODEL_PATH
        value: ./models/minilm/model.onnx
      - key: INDEX_PATH
        value: /tmp/ragforge_index
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "64"
      - key: MMR_LAMBDA
        value: "0.6"
      # Add ANTHROPIC_API_KEY or OPENAI_API_KEY via Render dashboard for LLM mode
    disk:
      name: ragforge-storage
      mountPath: /tmp
      sizeGB: 1
