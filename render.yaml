services:
  - type: web
    name: ragforge-wd3z
    runtime: docker
    region: singapore
    plan: free
    envVars:
      - key: INDEX_PATH
        value: /tmp/ragforge_index
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "64"
      - key: MMR_LAMBDA
        value: "0.6"
      - key: APP_PASSWORD
        sync: false   # Must be set manually in Render dashboard — never in code
